global:
  # Scrape targets every five seconds (default: one minute)
  # This enables data to be gathered quickly for this demonstration
  scrape_interval: 5s
  # Also evaluate alerting rules every five seconds
  # (This will be useful later in this guide)
  evaluation_interval: 5s
rule_files:
  - "alert_rules.yml"
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
scrape_configs:
  - job_name: gitea
    metrics_path: /metrics
    static_configs:
      - targets: ["gitea:3000"]
  - job_name: postgres
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres_exporter:9187"]
  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]
