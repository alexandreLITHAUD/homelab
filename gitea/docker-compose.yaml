services:
  gitea:
    image: gitea/gitea:${GITEA_VERSION}
    restart: unless-stopped
    userns_mode: "keep-id"
    # Configuration
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__SSH_PORT=${GITEA_SSH_PORT}
      - GITEA__database__PASSWD__FILE=/run/secrets/gitea_db_password
      - GITEA__database__DB_TYPE=${GITEA_DB_TYPE}
      - GITEA__database__HOST=${GITEA_DB_HOST}:${GITEA_DB_PORT}
      - GITEA__database__NAME=${GITEA_DB_NAME}
      - GITEA__database__USER=${GITEA_DB_USER}
      - GITEA__metrics__ENABLED="true"
      - TZ=${TZ}
    env_file:
      - ./.env
    # Data and Networking
    volumes:
      - ./data:/data
      - ./config:/etc/gitea
    secrets:
      - gitea_db_password
    ports:
      - "${GITEA_HTTP_PORT}:3000"
      - "${GITEA_SSH_PORT}:22"
    networks:
      - homelab
# Secrets
secrets:
  gitea_db_password:
    file: ../secrets/gitea-db-password.txt
# Networks
networks:
  homelab:
    external: true
